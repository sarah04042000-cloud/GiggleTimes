services:
  - type: web
    name: kids-audio-app
    plan: free
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn app:app --chdir backend"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: MONGO_URI
        generateValue: true
      - key: DB_NAME
        value: "kids_audio_app"
      - key: JWT_SECRET
        generateValue: true
